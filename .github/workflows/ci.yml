name: CI

on:
  push:
    branches: [main]
  pull_request:

# Opt into Node.js 24 for JavaScript actions ahead of the June 2026
# deprecation of Node 20 on GitHub runners. Once every action we use
# (actions/checkout, astral-sh/setup-uv) publishes a Node-24-native
# version, this flag can be removed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest -x -q

  migration-dry-run:
    name: Migration dry run
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: seadusloome
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: seadusloome
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U seadusloome"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync
      - name: Run migrations against live pg18
        env:
          DATABASE_URL: postgresql://seadusloome:localdev@localhost:5432/seadusloome
        run: uv run python scripts/migrate.py
      - name: Run migrations again (verify idempotency)
        env:
          DATABASE_URL: postgresql://seadusloome:localdev@localhost:5432/seadusloome
        run: uv run python scripts/migrate.py

  deploy:
    name: Deploy to Coolify
    needs: [lint-and-test, migration-dry-run]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy webhook
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_HOOK_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -e
          if [ -z "$COOLIFY_WEBHOOK" ]; then
            echo "::warning::COOLIFY_DEPLOY_HOOK_URL secret not set — skipping deploy trigger"
            exit 0
          fi
          if [ -z "$COOLIFY_API_TOKEN" ]; then
            echo "::warning::COOLIFY_API_TOKEN secret not set — Deploy Webhook requires Bearer auth; skipping"
            echo "::warning::See README 'Deploying' section for how to create the token"
            exit 0
          fi

          # Coolify's Deploy Webhook is an authenticated API endpoint
          # (https://app.coolify.io/api/v1/deploy?uuid=…). It requires an
          # Authorization: Bearer header using a Coolify API token. We
          # capture the HTTP status so the job fails loudly when Coolify
          # returns anything other than 200 — silent no-ops are how we
          # ended up debugging issue #437 for multiple phases.
          http_code=$(
            curl -sS -o /tmp/coolify-deploy.body -w '%{http_code}' \
              -X GET \
              -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_WEBHOOK"
          )
          echo "Coolify responded: HTTP $http_code"
          cat /tmp/coolify-deploy.body || true
          echo

          if [ "$http_code" != "200" ]; then
            echo "::error::Coolify deploy trigger returned HTTP $http_code"
            exit 1
          fi
          echo "Coolify deploy triggered successfully"
