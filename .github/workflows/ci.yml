name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest -x -q

  deploy:
    name: Deploy to Coolify
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy webhook
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK" ]; then
            echo "COOLIFY_DEPLOY_HOOK_URL secret not set — skipping deploy trigger"
            exit 0
          fi
          curl -fsS -X POST "$COOLIFY_WEBHOOK"
          echo "Coolify deploy triggered"
