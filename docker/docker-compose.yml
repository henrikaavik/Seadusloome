services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - ../.env
    # These three vars are intentionally hardcoded here and OVERRIDE
    # whatever is in ../.env. Docker Compose precedence: `environment:`
    # beats `env_file:` on key conflicts. This guarantees local dev
    # always points at the local tika container + compose-managed
    # volumes, regardless of the developer's .env values. The
    # trade-off is that STORAGE_DIR/EXPORT_DIR/TIKA_URL in .env are
    # IGNORED under compose — edit them here if you need different
    # paths.
    environment:
      TIKA_URL: http://tika:9998
      STORAGE_DIR: /var/seadusloome/drafts
      EXPORT_DIR: /var/seadusloome/exports
    volumes:
      - draftsdata:/var/seadusloome/drafts
      - exportsdata:/var/seadusloome/exports
    depends_on:
      postgres:
        condition: service_healthy
      jena:
        condition: service_healthy
      tika:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Standalone background-job worker (#348) — OPT-IN.
  # ---------------------------------------------------------------------------
  #
  # By default the FastHTML `app` container runs the worker in-process via
  # its ASGI lifespan hook (WORKER_MODE=inproc, the historical behaviour).
  # That's the right choice for local dev and small deployments.
  #
  # UNCOMMENT this block when:
  #   * scaling the web tier beyond a single container (otherwise each
  #     web replica would spawn its own worker thread, doubling the
  #     dispatch concurrency without any rate-limiting),
  #   * background job latency or CPU is dominating the web container,
  #   * or you want to deploy worker code without bouncing the web tier.
  #
  # When uncommented, ALSO set `WORKER_MODE=standalone` on the `app:`
  # service so its lifespan hook skips spawning the in-process worker.
  # Mixing modes (one inproc + N standalone) works but is rarely useful
  # — pick one and stay consistent.
  #
  # The worker reuses the same image, .env, and Postgres connection as
  # `app:`. It does NOT need draftsdata/exportsdata volumes mounted
  # unless your handlers read/write those paths (parse/extract/export
  # do; they share STORAGE_DIR/EXPORT_DIR with the web tier in prod).
  #
  # worker:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   env_file:
  #     - ../.env
  #   environment:
  #     WORKER_MODE: standalone
  #     TIKA_URL: http://tika:9998
  #     STORAGE_DIR: /var/seadusloome/drafts
  #     EXPORT_DIR: /var/seadusloome/exports
  #   command: ["python", "scripts/run_worker.py"]
  #   volumes:
  #     - draftsdata:/var/seadusloome/drafts
  #     - exportsdata:/var/seadusloome/exports
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     jena:
  #       condition: service_healthy
  #     tika:
  #       condition: service_healthy
  #   restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seadusloome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-seadusloome}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seadusloome}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tika:
    # Local dev only. In production, Tika is a separate Coolify application
    # with network alias `seadusloome-tika` (set TIKA_URL accordingly).
    image: apache/tika:3.3.0.0-full
    ports:
      - "9998:9998"  # Exposed for local curl testing; internal-only in prod
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9998/tika || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  jena:
    image: apache/jena-fuseki:5.4.0
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-localdev}
    volumes:
      - jenadata:/fuseki
      # Fuseki assembler config — auto-loaded on startup to create the
      # `ontology` dataset deterministically on a fresh volume (#429).
      - ./fuseki-config:/fuseki/configuration:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3030/$$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
  jenadata:
  draftsdata:
  exportsdata:
