services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ../app:/app/app
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      jena:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seadusloome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-seadusloome}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seadusloome}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  jena:
    image: stain/jena-fuseki
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-localdev}
      FUSEKI_DATASET_1: ${JENA_DATASET:-ontology}
    volumes:
      - jenadata:/fuseki
    restart: unless-stopped

volumes:
  pgdata:
  jenadata:
