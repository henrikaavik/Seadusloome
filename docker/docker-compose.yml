# =============================================================================
# Service exposure matrix (#853 / H2 + DoD "make clear which services are
# externally reachable and which must remain internal")
# =============================================================================
# This file is LOCAL DEVELOPMENT ONLY. Production runs on Coolify, which does
# NOT read this compose file — it manages each service and Traefik routing
# independently. The published-port (``ports:``) bindings below therefore only
# affect a developer's machine.
#
#   Service   | Local dev (this file)        | Production (Coolify)
#   ----------+------------------------------+--------------------------------
#   app       | 0.0.0.0:5001 (host browser)  | EXTERNAL via Traefik (HTTPS,
#             |                              |   seadusloome.sixtyfour.ee only)
#   postgres  | 127.0.0.1:5432 (loopback)    | INTERNAL only — private Docker
#             |                              |   network, NOT port-published,
#             |                              |   reached via DATABASE_URL
#   jena      | 127.0.0.1:3030 (loopback)    | INTERNAL only — reached via
#             |                              |   JENA_URL; write endpoints also
#             |                              |   behind fuseki:allowedUsers
#   tika      | 127.0.0.1:9998 (loopback)    | INTERNAL only — separate Coolify
#             |                              |   app, reached via TIKA_URL
#
# RULE: only ``app`` is ever externally reachable (and only via Traefik over
# HTTPS). postgres / jena / tika MUST stay internal in production — never add
# a Coolify "port mapping" / "public" toggle to them.
# =============================================================================
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - ../.env
    # These three vars are intentionally hardcoded here and OVERRIDE
    # whatever is in ../.env. Docker Compose precedence: `environment:`
    # beats `env_file:` on key conflicts. This guarantees local dev
    # always points at the local tika container + compose-managed
    # volumes, regardless of the developer's .env values. The
    # trade-off is that STORAGE_DIR/EXPORT_DIR/TIKA_URL in .env are
    # IGNORED under compose — edit them here if you need different
    # paths.
    environment:
      TIKA_URL: http://tika:9998
      STORAGE_DIR: /var/seadusloome/drafts
      EXPORT_DIR: /var/seadusloome/exports
    volumes:
      - draftsdata:/var/seadusloome/drafts
      - exportsdata:/var/seadusloome/exports
    depends_on:
      postgres:
        condition: service_healthy
      jena:
        condition: service_healthy
      tika:
        condition: service_healthy
    # #852: the lifespan shutdown joins worker + scheduler threads against a
    # shared 30s deadline (app/main.py); Docker's default SIGTERM grace is
    # 10s, which SIGKILLed mid-job workers on every deploy and orphaned
    # claimed/running rows. 35s = 30s join budget + margin. Production
    # (Coolify) does not read this file — set the equivalent stop-grace
    # there too (Coolify UI: application "Advanced" → custom docker options
    # `--stop-timeout 35`, or the docker-compose `stop_grace_period` field
    # for compose-based apps).
    stop_grace_period: 35s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Standalone background-job worker (#348) — OPT-IN.
  # ---------------------------------------------------------------------------
  #
  # By default the FastHTML `app` container runs the worker in-process via
  # its ASGI lifespan hook (WORKER_MODE=inproc, the historical behaviour).
  # That's the right choice for local dev and small deployments.
  #
  # UNCOMMENT this block when:
  #   * scaling the web tier beyond a single container (otherwise each
  #     web replica would spawn its own worker thread, doubling the
  #     dispatch concurrency without any rate-limiting),
  #   * background job latency or CPU is dominating the web container,
  #   * or you want to deploy worker code without bouncing the web tier.
  #
  # When uncommented, ALSO set `WORKER_MODE=standalone` on the `app:`
  # service so its lifespan hook skips spawning the in-process worker.
  # Mixing modes (one inproc + N standalone) works but is rarely useful
  # — pick one and stay consistent.
  #
  # The worker reuses the same image, .env, and Postgres connection as
  # `app:`. It does NOT need draftsdata/exportsdata volumes mounted
  # unless your handlers read/write those paths (parse/extract/export
  # do; they share STORAGE_DIR/EXPORT_DIR with the web tier in prod).
  #
  # worker:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   env_file:
  #     - ../.env
  #   environment:
  #     WORKER_MODE: standalone
  #     TIKA_URL: http://tika:9998
  #     STORAGE_DIR: /var/seadusloome/drafts
  #     EXPORT_DIR: /var/seadusloome/exports
  #   command: ["python", "scripts/run_worker.py"]
  #   volumes:
  #     - draftsdata:/var/seadusloome/drafts
  #     - exportsdata:/var/seadusloome/exports
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     jena:
  #       condition: service_healthy
  #     tika:
  #       condition: service_healthy
  #   restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg18@sha256:42e7f6b4e1eceb02ff14e3e6bc6108bbe259abbe83879dc1845d0da1ddeb555d
    ports:
      # #853 / H2: bind to the loopback interface only. A bare "5432:5432"
      # publishes Postgres on 0.0.0.0, i.e. every interface of the host —
      # on a cloud VM that means the database is reachable from the public
      # internet (and Docker's published-port iptables rules bypass UFW).
      # 127.0.0.1 keeps it reachable for local psql / app-on-host dev while
      # closing external exposure. PRODUCTION NOTE: prod runs on Coolify,
      # which ignores this compose file — Postgres there is an INTERNAL-only
      # Coolify service reached over the private Docker network by
      # DATABASE_URL and is never port-published. See the externally-vs-
      # internally-reachable matrix below.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seadusloome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-seadusloome}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seadusloome}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tika:
    # Local dev only. In production, Tika is a separate Coolify application
    # with network alias `seadusloome-tika` (set TIKA_URL accordingly).
    image: apache/tika:3.3.0.0-full@sha256:ecdd37e204308266b1f8e28569f8516ebd5b96d7a4518a71d3904710b20c03b3
    ports:
      # #853 / H2: loopback-only for local curl testing; internal-only in
      # prod (separate Coolify app, reached via TIKA_URL). See the matrix
      # at the top of this file.
      - "127.0.0.1:9998:9998"
    environment:
      # Bound the JVM heap so the JVM honours the container memory limit
      # instead of sizing itself against the host RAM.  The container hard
      # limit is set via deploy.resources.limits.memory below.
      # 512m heap + ~100m metaspace/native ≈ fits in 768m container limit.
      # Adjust these values if you raise/lower the memory limit.
      #
      # JAVA_TOOL_OPTIONS, not JAVA_OPTS: the official apache/tika-docker
      # entrypoint invokes `java` directly without shell-expanding $JAVA_OPTS,
      # so JAVA_OPTS is silently ignored. JAVA_TOOL_OPTIONS is read by HotSpot
      # itself at JVM startup regardless of how java is invoked — the JVM
      # prints "Picked up JAVA_TOOL_OPTIONS: ..." at boot, which also serves
      # as confirmation that the flags were applied.
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx512m"
    deploy:
      resources:
        limits:
          # Hard cap: Tika OOMs without a limit on multi-document bursts.
          # 768 MB covers a 512 MB heap + JVM overhead; raise to 1g if
          # parsing large PDFs regularly.  Production: set the equivalent
          # limit in the Coolify service "Resources" tab.
          memory: 768m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9998/tika || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  jena:
    # stain/jena-fuseki matches the exact digest running in production
    # (read off the prod VPS).  The previous reference, apache/jena-fuseki:5.4.0,
    # does not exist on Docker Hub — the apache/ namespace for Fuseki is not
    # published there, which is also why the anonymous-token grant came back
    # empty during the #861 digest-pinning pass.  A Fuseki version upgrade is
    # tracked separately; do not change this image without a dedicated upgrade
    # PR and testing against the fuseki-config assembler.
    image: stain/jena-fuseki:latest@sha256:b1d0c96f19adddef417520184471ac816cf36c6e72936a88ea02b29f4305929a
    ports:
      # #853 / H2: loopback-only, same rationale as postgres above. Even
      # though the write endpoints are now behind fuseki:allowedUsers
      # (docker/fuseki-config/ontology.ttl), the read/query + admin
      # ($/datasets) endpoints should not face the public internet from a
      # dev box. PRODUCTION NOTE: on Coolify, Jena is an INTERNAL-only
      # service reached via JENA_URL over the private network — not
      # port-published. See the matrix below.
      - "127.0.0.1:3030:3030"
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-localdev}
    volumes:
      - jenadata:/fuseki
      # Fuseki assembler config — auto-loaded on startup to create the
      # `ontology` dataset deterministically on a fresh volume (#429).
      - ./fuseki-config:/fuseki/configuration:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3030/$$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
  jenadata:
  draftsdata:
  exportsdata:
